<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Trial Simulation Hub</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.55.0/build/stlite.css" />
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      #root {
        height: 100vh;
      }
      .skip-link {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .skip-link:focus {
        width: auto;
        height: auto;
        padding: 10px 15px;
        margin: 0;
        overflow: visible;
        clip: auto;
        white-space: normal;
        background-color: #496D89;
        color: #FFFFFF;
        z-index: 999999;
        top: 0;
        left: 0;
        text-decoration: none;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <a href="#main-content-anchor" class="skip-link">Skip to Main Content</a>
    <div id="root"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/iframe-resizer/4.3.9/iframeResizer.contentWindow.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.55.0/build/stlite.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(function(registration) {
          console.log('ServiceWorker registration successful with scope: ', registration.scope);
        }).catch(function(err) {
          console.log('ServiceWorker registration failed: ', err);
        });
      }

      stlite.mount(
        {
          requirements: ["altair", "plotly", "matplotlib", "pandas", "numpy", "scipy", "statsmodels", "tqdm", "./clintrials-latest-py3-none-any.whl"],
          entrypoint: "app.py",
          files: {
            ".streamlit/config.toml": `
[theme]
primaryColor = "#496D89"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#31333F"
font = "sans serif"
`,
            "app.py": `
from clintrials.visualization.dashboard.main import main
if __name__ == "__main__":
    main()
`
          },
        },
        document.getElementById("root")
      );
    </script>
  </body>
</html>
