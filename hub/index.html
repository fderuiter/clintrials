<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Trial Simulation Hub - Dynamic Configuration</title>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 40px;
        background-color: #F0F2F6;
        color: #31333F;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        background: #FFFFFF;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }
      h1 {
        color: #496D89;
      }
      select {
        width: 100%;
        padding: 10px;
        margin-bottom: 30px;
        font-size: 16px;
        border-radius: 4px;
        border: 1px solid #ccc;
      }
      .form-group {
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid #eee;
      }
      .form-group:last-child {
        border-bottom: none;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .description {
        font-size: 0.85em;
        color: #666;
        margin-bottom: 8px;
        font-style: italic;
      }
      input {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 16px;
      }
      input.invalid {
        border-color: #dc3545;
        background-color: #f8d7da;
      }
      .error-msg {
        color: #dc3545;
        font-size: 0.85em;
        margin-top: 5px;
        display: none;
      }
      button.submit {
        background-color: #496D89;
        color: white;
        border: none;
        padding: 12px 20px;
        font-size: 16px;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 20px;
      }
      button.submit:hover {
        background-color: #365267;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Simulation Configuration</h1>
      <p>Select a trial model to configure parameters.</p>
      
      <select id="schema-selector">
        <option value="">-- Select Model Schema --</option>
      </select>
      
      <form id="dynamic-form" style="display: none;">
        <div id="form-fields"></div>
        <button type="submit" class="submit">Run Simulation</button>
      </form>
    </div>

    <script>
      let schemas = {};

      async function initializeApp() {
        try {
          const response = await fetch('schema.json');
          if (!response.ok) throw new Error("Failed to load schema.json");
          schemas = await response.json();
          
          const selector = document.getElementById('schema-selector');
          for (const schemaName in schemas) {
            const option = document.createElement('option');
            option.value = schemaName;
            option.textContent = schemaName.replace('Schema', ' Model');
            selector.appendChild(option);
          }
          
          selector.addEventListener('change', (e) => {
            renderForm(e.target.value);
          });
        } catch (err) {
          console.error("Initialization error:", err);
          document.querySelector('.container').innerHTML += '<p style="color:red">Failed to load configuration schemas.</p>';
        }
      }

      function validateField(input, prop, errorEl) {
        let isValid = true;
        let errorMsg = '';
        const val = input.value;

        if (prop.type === 'array') {
           if (val.trim() === '') {
              // Not required unless specified, keeping simple
           } else {
              const items = val.split(',').map(s => s.trim());
              const itemSchema = prop.items;
              if (itemSchema && (itemSchema.type === 'number' || itemSchema.type === 'integer')) {
                 for (const item of items) {
                    const num = Number(item);
                    if (isNaN(num)) {
                       isValid = false;
                       errorMsg = 'All array items must be numbers';
                       break;
                    }
                    if (itemSchema.minimum !== undefined && num < itemSchema.minimum) {
                       isValid = false; errorMsg = \`Items must be >= \${itemSchema.minimum}\`; break;
                    }
                    if (itemSchema.maximum !== undefined && num > itemSchema.maximum) {
                       isValid = false; errorMsg = \`Items must be <= \${itemSchema.maximum}\`; break;
                    }
                 }
              }
           }
        } else if (prop.type === 'integer' || prop.type === 'number') {
          if (val === '') {
             // assuming required fields are handled on submit
          } else {
            const num = Number(val);
            if (isNaN(num)) {
              isValid = false;
              errorMsg = 'Must be a valid number';
            } else {
              if (prop.type === 'integer' && !Number.isInteger(num)) {
                isValid = false;
                errorMsg = 'Must be an integer';
              }
              if (prop.minimum !== undefined && num < prop.minimum) {
                isValid = false;
                errorMsg = \`Value must be >= \${prop.minimum}\`;
              }
              if (prop.maximum !== undefined && num > prop.maximum) {
                isValid = false;
                errorMsg = \`Value must be <= \${prop.maximum}\`;
              }
              if (prop.exclusiveMinimum !== undefined && num <= prop.exclusiveMinimum) {
                isValid = false;
                errorMsg = \`Value must be strictly > \${prop.exclusiveMinimum}\`;
              }
              if (prop.exclusiveMaximum !== undefined && num >= prop.exclusiveMaximum) {
                isValid = false;
                errorMsg = \`Value must be strictly < \${prop.exclusiveMaximum}\`;
              }
            }
          }
        }

        if (!isValid) {
          input.classList.add('invalid');
          errorEl.textContent = errorMsg;
          errorEl.style.display = 'block';
        } else {
          input.classList.remove('invalid');
          errorEl.style.display = 'none';
        }
        return isValid;
      }

      function renderForm(schemaName) {
        const form = document.getElementById('dynamic-form');
        const formFields = document.getElementById('form-fields');
        formFields.innerHTML = '';
        
        if (!schemaName) {
          form.style.display = 'none';
          return;
        }
        form.style.display = 'block';

        const schema = schemas[schemaName];
        const properties = schema.properties;
        const required = schema.required || [];

        for (const [key, prop] of Object.entries(properties)) {
          const group = document.createElement('div');
          group.className = 'form-group';

          const label = document.createElement('label');
          label.textContent = key + (required.includes(key) ? ' *' : '');
          label.setAttribute('for', key);

          if (prop.description) {
            const desc = document.createElement('div');
            desc.className = 'description';
            desc.textContent = prop.description;
            desc.title = prop.description;
            group.appendChild(desc);
          }

          const input = document.createElement('input');
          input.id = key;
          input.name = key;

          if (prop.type === 'integer' || prop.type === 'number') {
            input.type = 'number';
            if (prop.type === 'number') input.step = 'any';
            if (prop.minimum !== undefined) input.min = prop.minimum;
            if (prop.maximum !== undefined) input.max = prop.maximum;
          } else {
            input.type = 'text';
            if (prop.type === 'array') {
              input.placeholder = 'e.g., 0.1, 0.2, 0.3';
            }
          }

          if (prop.default !== undefined) {
             if (prop.type === 'array') {
               input.value = Array.isArray(prop.default) ? prop.default.join(', ') : prop.default;
             } else {
               input.value = prop.default;
             }
          }
          
          if (required.includes(key)) {
            input.required = true;
          }

          const error = document.createElement('div');
          error.className = 'error-msg';
          error.id = key + '-error';

          input.addEventListener('input', () => {
             validateField(input, prop, error);
          });

          group.appendChild(label);
          group.appendChild(input);
          group.appendChild(error);
          
          formFields.appendChild(group);
          
          // trigger validation for defaults
          if (input.value) {
             validateField(input, prop, error);
          }
        }
        
        form.onsubmit = (e) => {
           e.preventDefault();
           let allValid = true;
           for (const [key, prop] of Object.entries(properties)) {
              const input = document.getElementById(key);
              const error = document.getElementById(key + '-error');
              if (!validateField(input, prop, error)) {
                 allValid = false;
              }
           }
           if (allValid) {
              alert("Simulation configuration valid and submitted!");
           } else {
              alert("Please correct validation errors before submitting.");
           }
        };
      }

      window.addEventListener('DOMContentLoaded', initializeApp);
    </script>
  </body>
</html>
