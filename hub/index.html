<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Trial Simulation Hub</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="vendor/stlite.css" />
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      #root {
        height: 100vh;
      }
      .skip-link {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .skip-link:focus {
        width: auto;
        height: auto;
        padding: 10px 15px;
        margin: 0;
        overflow: visible;
        clip: auto;
        white-space: normal;
        background-color: #496D89;
        color: #FFFFFF;
        z-index: 999999;
        top: 0;
        left: 0;
        text-decoration: none;
        font-family: sans-serif;
      }
    </style>
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const isEmbed = urlParams.get('embed') === 'true';
      const activeView = urlParams.get('view') || '';
      
      if (isEmbed) {
        const style = document.createElement('style');
        style.innerHTML = `
          header[data-testid="stHeader"] { display: none !important; }
          footer { display: none !important; }
          section[data-testid="stSidebar"] { display: none !important; }
          .stDeployButton { display: none !important; }
          div[data-testid="collapsedControl"] { display: none !important; }
          .stApp { background-color: transparent !important; }
        `;
        document.head.appendChild(style);
      }
    </script>
  </head>
  <body>
    <a href="#main-content-anchor" class="skip-link">Skip to Main Content</a>
    <div id="root"></div>
    <script src="vendor/iframeResizer.contentWindow.min.js"></script>
    <script src="vendor/stlite.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        const isSubpath = window.location.pathname.includes('/clintrials/');
        const swUrl = isSubpath ? '/clintrials/sw.js' : '/sw.js';
        const swScope = isSubpath ? '/clintrials/' : '/';
        navigator.serviceWorker.register(swUrl, { scope: swScope }).then(function(registration) {
          console.log('ServiceWorker registration successful with scope: ', registration.scope);
        }).catch(function(err) {
          console.log('ServiceWorker registration failed: ', err);
        });
      }

      let themeConfig = `
[theme]
primaryColor = "#496D89"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#31333F"
font = "sans serif"
`;
      if (isEmbed) {
        themeConfig = `
[theme]
primaryColor = "#2980B9"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F3F6F6"
textColor = "#404040"
font = "sans serif"
`;
      }

      async function launchSafeMode(errorMsg) {
        console.error("Launching Safe Mode due to:", errorMsg);
        stlite.mount(
          {
            requirements: [],
            entrypoint: "app.py",
            files: {
              ".streamlit/config.toml": themeConfig,
              "app.py": `
import streamlit as st

st.set_page_config(page_title="Safe Mode Dashboard", page_icon="⚠️")
st.title("⚠️ Safe Mode Dashboard")
st.error("The Trial Simulation Hub encountered a critical error during initialization.")
st.warning("You have been automatically booted into Safe Mode to prevent a total failure.")
st.write("### Diagnostic Details")
st.code("""${errorMsg}""")
st.write("### Troubleshooting")
st.write("- Please verify your internet connection.")
st.write("- Check if the custom wheel dependency was built and published correctly.")
`
            },
          },
          document.getElementById("root")
        );
      }

      async function initializeWorkspace() {
        try {
          const manifestResponse = await fetch("build-manifest.json");
          if (!manifestResponse.ok) {
            throw new Error(`Failed to load build-manifest.json: ${manifestResponse.status} ${manifestResponse.statusText}`);
          }
          const manifest = await manifestResponse.json();
          const wheelFile = manifest.wheel;
          if (!wheelFile) {
            throw new Error("Invalid manifest: missing 'wheel' parameter.");
          }

          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 3000);
          
          let wheelResponse;
          try {
            wheelResponse = await fetch(wheelFile, { method: "HEAD", signal: controller.signal });
          } catch (e) {
            if (e.name === 'AbortError') {
              throw new Error(`Pre-flight check timed out after 3 seconds while trying to reach ${wheelFile}`);
            }
            throw new Error(`Pre-flight check failed: ${e.message}`);
          } finally {
            clearTimeout(timeoutId);
          }

          if (!wheelResponse.ok) {
            throw new Error(`Custom wheel dependency returned HTTP ${wheelResponse.status} for ${wheelFile}`);
          }

          const paramsObj = {};
          for (const [key, value] of urlParams.entries()) {
            paramsObj[key] = value;
          }

          stlite.mount(
            {
              requirements: ["altair", "plotly", "matplotlib", "pandas", "numpy", "scipy", "statsmodels", "tqdm", "./" + wheelFile],
              entrypoint: "app.py",
              files: {
                ".streamlit/config.toml": themeConfig,
                "config.json": JSON.stringify(paramsObj),
                "app.py": `
import streamlit as st

from clintrials.visualization.dashboard.main import main
if __name__ == "__main__":
    main()
`
              },
            },
            document.getElementById("root")
          );

        } catch (error) {
          launchSafeMode(error.message || String(error));
        }
      }

      initializeWorkspace();
    </script>
  </body>
</html>
