name: Unified Atomic Deployment (Docs & Hub)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Required for Pages deployments
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install poetry
        run: pipx install poetry

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Install dependencies
        run: |
          poetry install --all-extras

      - name: Fetch Vendor Dependencies
        run: ./fetch_vendor.sh

      - name: Build Sphinx HTML
        env:
          SPHINX_STRICT: "1"
        run: |
          poetry run sphinx-build -b html -n -W docs docs/_build/html
          npx -y pagefind --site docs/_build/html

      - name: Linkcheck (optional)
        run: poetry run sphinx-build -b linkcheck docs docs/_build/linkcheck

      - name: Build clintrials wheel
        run: poetry build --format wheel

      - name: Serialize Python schemas to JSON
        run: poetry run python scripts/serialize_schemas.py

      - name: Prepare unified staging directory
        run: |
          mkdir -p public
          # Copy Sphinx documentation to the root of staging
          cp -a docs/_build/html/. public/
          # Ensure Jekyll is bypassed on GitHub Pages so _static/* is served
          touch public/.nojekyll
          # Setup Simulation Hub in /hub/
          mkdir -p public/hub
          cp -a hub/. public/hub/
          cp dist/*.whl public/hub/
          VERSION=$(poetry version -s)
          echo "{\"version\": \"$VERSION\", \"wheel\": \"clintrials-$VERSION-py3-none-any.whl\"}" > public/hub/build-manifest.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
