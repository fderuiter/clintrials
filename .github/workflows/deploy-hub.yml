name: Deploy Trial Simulation Hub (PWA)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'clintrials/visualization/dashboard/**'
      - 'hub/**'
      - '.github/workflows/deploy-hub.yml'
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-hub"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install poetry
        run: pipx install poetry

      - name: Build clintrials wheel
        run: poetry build --format wheel

      - name: Prepare Hub Directory
        run: |
          mkdir -p public/hub
          cp -r hub/* public/hub/
          cp dist/*.whl public/hub/clintrials-latest-py3-none-any.whl

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/hub

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
