name: Test Suite
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-r-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --with dev
      - name: Generate fixtures
        run: ./tests/fixtures/generate_fixtures.sh
      - name: Check for differences
        run: git diff --exit-code tests/fixtures/

  test-notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --with dev -E viz
      - name: Test Tutorial Notebooks
        run: |
          find docs/tutorials -name "*.ipynb" -not -name "*draft*" -not -name "*test*" | while read nb; do
            echo "Testing $nb"
            PYTHONPATH=$GITHUB_WORKSPACE poetry run jupyter nbconvert --to notebook --execute "$nb" || exit 1
          done

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install poetry
        run: pipx install poetry
      - name: Install dependencies
        run: |
          poetry install --with dev -E viz
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
      - name: Install Playwright browsers
        run: poetry run playwright install chromium --with-deps
      - name: Run tests
        run: |
          poetry run coverage run -m pytest -q
          poetry run coverage report -m
          poetry run coverage xml

  test-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install poetry
        run: pipx install poetry
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Install dependencies
        run: poetry install --all-extras
      - name: Fetch Vendor Dependencies
        run: ./fetch_vendor.sh
      - name: Build Sphinx HTML
        env:
          SPHINX_STRICT: "1"
        run: |
          poetry run sphinx-build -b html -n -W docs docs/_build/html
          npx -y pagefind --site docs/_build/html
