name: Build & Deploy Sphinx docs to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Required for Pages deployments
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install poetry
        run: pipx install poetry

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Install dependencies
        run: |
          poetry install --all-extras

      - name: Build Sphinx HTML
        env:
          SPHINX_STRICT: "1"
        run: |
          poetry run sphinx-build -b html -n -W docs docs/_build/html

      - name: Linkcheck (optional)
        run: poetry run sphinx-build -b linkcheck docs docs/_build/linkcheck

      # Critical step: ensure Jekyll is bypassed so _static/* is served
      - name: Bypass Jekyll on GitHub Pages
        run: touch docs/_build/html/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
