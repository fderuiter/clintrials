name: Sanitize CI/CD Fix Bot Comment

on:
  issue_comment:
    types: [created]

jobs:
  sanitize-comment:
    # 1. Ensure this comment is on a Pull Request (not an issue)
    # 2. Ensure the comment body contains "[CI/CD Fix Attempt "
    if: ${{ github.event.issue.pull_request && contains(github.event.comment.body, '[CI/CD Fix Attempt ') }}
    runs-on: ubuntu-latest
    permissions:
      issues: write # Required to edit comments on PRs
      pull-requests: write

    steps:
      - name: Update Comment Body
        uses: actions/github-script@v7
        with:
          script: |
            const commentId = context.payload.comment.id;
            const originalBody = context.payload.comment.body;

            // Matches "[CI/CD Fix Attempt <number>]" or similar variations and replaces with "[CI/CD Fix]"
            const updatedBody = originalBody.replace(/\[CI\/CD Fix Attempt \d+\]/g, '[CI/CD Fix]');

            // Only issue an API call if a change actually occurred
            if (updatedBody !== originalBody) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: commentId,
                body: updatedBody
              });
              console.log(`Successfully updated comment ${commentId}`);
            }
