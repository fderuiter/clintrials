[mypy]
strict = True
warn_unused_ignores = False
ignore_missing_imports = True
disallow_any_unimported = False

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-statsmodels.*]
ignore_missing_imports = True

[mypy-plotly.*]
ignore_missing_imports = True

